name: Continuous Deployment (Build & Push Docker)

# 🌟 触发时机：只有当 main 分支发生 push 事件（即 PR 合并成功或直接 push）时才触发
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取最新的代码
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ✅ 2. 【精准修正】设置 Docker Buildx (使用正式推荐的官方 Action)
    # 这个 Action 由 'docker' 组织提供，专门用于设置 Buildx，支持高级构建功能（如多架构、缓存等）。
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3  # 👈 修改这里

    # 3. 登录到 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. 构建并推送镜像
    - name: Build and push Docker image
        # 注意：这里和下面 tags 的缩进我也帮你统一规范了一下
      uses: docker/build-push-action@v5
      with:
        context: .  # 指定 Dockerfile 所在的目录（当前项目根目录）
        file: ./Dockerfile  # 指定 Dockerfile 的路径
        push: true  # 确认为 true，构建完后直接推送到远端仓库
        # 🌟 镜像标签设置：包含 latest 标签，以及使用 GitHub 的 commit 简写作为版本号
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/my-test-platform:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/my-test-platform:${{ github.sha }}
          
    # 5. 运行容器内测试，并将报告挂载到 GitHub 虚拟机的本地目录
    - name: Run Tests inside container and export report
      run: |
        # 创建一个云端临时目录用来接住报告
        mkdir -p ./gh_reports
        # 运行容器，通过 -v 将容器内的 /app/reports 映射到 GitHub 虚拟机的 ./gh_reports
        # 注意：这里的 /app/reports 路径需与你测试平台实际生成报告的绝对路径一致
        docker run --rm -v $(pwd)/gh_reports:/app/reports ${{ secrets.DOCKERHUB_USERNAME }}/my-test-platform:latest

    # 6. 【新增】将报告作为流水线产物上传，自动保存（供浏览器下载）
    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pytest-html-report  # 下载时的压缩包名称
        path: ./gh_reports/       # 需要抓取并保存的云端目录
        retention-days: 7         # 报告在 GitHub 上保留的天数（过期自动销毁）