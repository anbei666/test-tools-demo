name: Continuous Deployment (Build & Push Docker)

on:
  push:
    branches: [ main ]

jobs:
  build_and_push:
    name: Continuous Deployment (Build & Push Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚨 原来的 actions/setup-docker-actions 这一步已经被删除了

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-test-platform:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/my-test-platform:latest