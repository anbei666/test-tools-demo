name: Python Pytest CI

# 1. 触发条件：当向 main 分支提交 Pull Request 时触发
on:
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    # 2. 运行环境：指定在最新版的 Ubuntu 虚拟机上运行
    runs-on: ubuntu-latest

    steps:
    # 3. 步骤一：拉取仓库代码到虚拟机中
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 4. 步骤二：在虚拟机上配置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 可以指定你项目需要的 Python 版本

    # 5. 步骤三：缓存依赖（可选，但能大幅提升后续的构建速度）
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 6. 步骤四：安装项目依赖和 pytest
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest  # 确保安装了 pytest

    # 7. 步骤五：执行 pytest 测试
    - name: Run pytest
      run: |
        pytest