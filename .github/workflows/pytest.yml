name: Python Advanced CI (Lint, Security, Type, Test)

on:
  pull_request:
    branches: [ main ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. 配置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 依赖缓存机制
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. 安装所有依赖及工具链
    - name: Install dependencies and tools
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 安装静态检测工具链与测试插件
        pip install ruff bandit mypy pytest pytest-html

    # 5. 【静态检测 1】代码规范与格式检查 (Ruff)
    - name: Run Ruff Lint Check
      run: |
        # ruff check 会检查代码规范（类似 Flake8/Pylint），不符合规范会报错
        ruff check .

    # 6. 【静态检测 2】安全漏洞扫描 (Bandit)
    - name: Run Bandit Security Scan
      run: |
        # -r 递归扫描目录，-x 排除测试文件夹（测试用例中常包含断言或模拟数据，无需扫描安全）
        bandit -r . -x ./tests

    # 7. 【静态检测 3】静态类型检查 (Mypy)
    - name: Run Mypy Type Check
      run: |
        # 检查项目中的类型提示是否正确，--ignore-missing-imports 防止第三方库没有类型声明时报错
        mypy . --ignore-missing-imports

    # 8. 【动态测试】执行 Pytest 并生成 HTML 报告
    - name: Run pytest
      run: |
        pytest --html=report.html --self-contained-html

    # 9. 【产物收集】上传测试报告
    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always() # 确保前面的静态检查或测试失败时，只要生成了报告就一定上传
      with:
        name: enterprise-pytest-report
        path: report.html
        retention-days: 14