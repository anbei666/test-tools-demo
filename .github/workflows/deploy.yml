name: Auto Package on Merge

# 1. 触发条件：只有当代码 merge/push 到 main 分支时才触发
on:
  push:
    branches:
      - main

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    steps:
      # 第一步：拉取仓库的最新代码
      - name: Check out repository code
        uses: actions/checkout@v4

      # 第二步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 保持与你本地一致的 Python 版本

      # 第三步：运行本地打包脚本
      - name: Run local packaging script
        run: python pack_project.py

      # 🌟 第四步：将生成的压缩包保存为 GitHub Artifacts（可选）
      # 这样你不需要登录服务器，直接在 GitHub 的 Actions 页面就能看到并下载这个 .tar.gz 包
      - name: Upload packaged artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: project-release-package
          path: "*.tar.gz" # 匹配脚本生成的 tar.gz 文件
          retention-days: 7 # 在 GitHub 上保留 7 天，过期自动清理